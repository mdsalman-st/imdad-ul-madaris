<!DOCTYPE html>
<html>
<head>
  <title>Ask Mufti</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
  <style>
    body { font-family: serif; background: #f9f9e8; padding: 20px; text-align: center; }
    h1 { color: #165a29; }
    form, .qa-box { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 0 5px #ccc; }
    input, textarea, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 6px; border: 1px solid #ccc; }
    button { background-color: #165a29; color: white; border: none; }
    .answer { background: #e2fce2; padding: 10px; margin-top: 8px; border-radius: 8px; }
  </style>
</head>
<body>

  <h1>Ask Mufti</h1>
  <form id="askForm">
    <input type="text" id="name" placeholder="Your Name *" required />
    <textarea id="question" placeholder="Your Question..." required></textarea>
    <button type="submit">Submit</button>
  </form>

  <div id="qaList"></div>

  <script>
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCZTzeqYz_KSzxUsZtYsxYeXS00FkGZKA0",
  authDomain: "tableeg-ba0e5.firebaseapp.com",
  projectId: "tableeg-ba0e5",
  storageBucket: "tableeg-ba0e5.firebasestorage.app",
  messagingSenderId: "201862792828",
  appId: "1:201862792828:web:b598a523833d5a6f1a2bf9",
  measurementId: "G-70GG7KGFX7"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const form = document.getElementById("askForm");
    const nameInput = document.getElementById("name");
    const questionInput = document.getElementById("question");
    const qaList = document.getElementById("qaList");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const question = questionInput.value.trim();
      if (!name || !question) return;

      await db.collection("askMufti").add({
        name: name,
        question: question,
        answer: "",
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      questionInput.value = "";
      loadQuestions(name);
    });

    function loadQuestions(name) {
      qaList.innerHTML = "";
      db.collection("askMufti")
        .where("name", "==", name)
        .orderBy("timestamp", "desc")
        .onSnapshot(snapshot => {
          qaList.innerHTML = "";
          snapshot.forEach(doc => {
            const data = doc.data();
            const div = document.createElement("div");
            div.className = "qa-box";
            div.innerHTML = `
              <p><strong>Q:</strong> ${data.question}</p>
              ${data.answer ? `<div class="answer"><strong>A:</strong> ${data.answer}</div>` : "<div class='answer'>Waiting for answer...</div>"}
            `;
            qaList.appendChild(div);
          });
        });
    }

    nameInput.addEventListener("blur", () => {
      const name = nameInput.value.trim();
      if (name) loadQuestions(name);
    });
  </script>
</body>
</html>
