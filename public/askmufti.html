<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Mufti | Imdad ul Madaris</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }

        .navbar { background: #0a5c2e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { color: white; font-weight: 700; text-decoration: none; font-size: 1rem; }
        .menu-btn { background: none; border: none; cursor: pointer; padding: 4px; }

        .hero { background: linear-gradient(135deg, #0a5c2e, #064e1f); color: white; text-align: center; padding: 36px 20px; }
        .hero h1 { font-size: 1.6rem; margin-bottom: 8px; }
        .hero p { font-size: 0.9rem; opacity: 0.9; max-width: 520px; margin: 0 auto; }

        .container { max-width: 720px; margin: 0 auto; padding: 28px 20px 48px; }

        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 24px; }
        .card h2 { font-size: 1.1rem; color: #0a5c2e; margin-bottom: 16px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: #475569; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 11px 12px; border: 2px solid #e2e8f0; border-radius: 10px;
            font-family: inherit; font-size: 0.9rem; outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #0a5c2e; }
        textarea { min-height: 110px; resize: vertical; }

        .submit-btn {
            background: #0a5c2e; color: white; border: none; width: 100%; padding: 13px;
            border-radius: 12px; font-weight: 600; font-size: 0.95rem; cursor: pointer;
        }
        .submit-btn:hover { background: #064e1f; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .qa-item { border-bottom: 1px solid #f1f5f9; padding: 16px 0; }
        .qa-item:last-child { border-bottom: none; }
        .qa-item .q { font-weight: 600; color: #0f172a; margin-bottom: 6px; }
        .qa-item .meta { font-size: 0.75rem; color: #94a3b8; margin-bottom: 8px; }
        .qa-item .a { background: #f0fdf4; padding: 10px 12px; border-radius: 8px; color: #166534; font-size: 0.9rem; }
        .qa-item .pending { color: #b45309; font-size: 0.85rem; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; }

        footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 0.8rem; }
    </style>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕌</text></svg>">
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">🕌 Imdad ul Madaris</a>
    <button type="button" class="menu-btn" id="menuBtn" aria-label="Open menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>
</nav>

<div class="hero">
    <h1>❓ Ask a Mufti</h1>
    <p>Submit your Islamic question. Our scholars will answer as soon as possible.</p>
</div>

<div class="container">
    <div class="card">
        <h2>Submit Your Question</h2>
        <form id="askForm">
            <div class="form-group">
                <label for="askName">Your Name *</label>
                <input type="text" id="askName" required placeholder="Full name">
            </div>
            <div class="form-group">
                <label for="askEmail">Email *</label>
                <input type="email" id="askEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="askCategory">Category</label>
                <select id="askCategory">
                    <option value="Fiqh">Fiqh</option>
                    <option value="Zakat">Zakat</option>
                    <option value="Prayer">Prayer</option>
                    <option value="Family">Family</option>
                    <option value="General">General</option>
                </select>
            </div>
            <div class="form-group">
                <label for="askQuestion">Your Question *</label>
                <textarea id="askQuestion" required placeholder="Type your question here..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Submit Question</button>
        </form>
    </div>

    <div class="card">
        <h2>Your Previous Questions</h2>
        <div id="questionsList">
            <p style="text-align:center;color:#94a3b8;padding:20px;">Enter your email above to see your previous questions.</p>
        </div>
    </div>
</div>

<footer><p>&copy; 2026 Imdad ul Madaris</p></footer>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="index.js"></script>
<script src="askmufti.js"></script>
</body>
</html>
