<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>All Madrasas | Imdad ul Madaris</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fb;
      color: #1e293b;
    }

    /* Navbar */
    .navbar {
      background: #0a5c2e;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
    }
    .menu-icon {
      background: none;
      border: none;
      cursor: pointer;
      margin-left: auto;
      padding: 4px;
    }

    /* Search Bar */
    .search-container {
      max-width: 600px;
      margin: 20px auto;
      padding: 0 16px;
    }
    .search-box {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 50px;
      font-size: 0.9rem;
      background: white;
      outline: none;
      transition: border 0.2s;
    }
    .search-box:focus {
      border-color: #0a5c2e;
    }

    /* State Filter */
    .filter-container {
      max-width: 600px;
      margin: 12px auto;
      padding: 0 16px;
    }
    .state-filter {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 50px;
      background: white;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    /* Results Count */
    .results-count {
      max-width: 1200px;
      margin: 16px auto 0;
      padding: 0 16px;
      font-size: 0.85rem;
      color: #64748b;
    }

    /* Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Madrasa Grid */
    .madrasa-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin: 20px 0 40px;
    }

    @media (min-width: 550px) {
      .madrasa-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 900px) {
      .madrasa-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* Card */
    .madrasa-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: 0.2s;
      cursor: pointer;
    }
    .madrasa-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }
    .card-img {
      height: 140px;
      background-size: cover;
      background-position: center;
    }
    .card-content {
      padding: 14px;
    }
    .madrasa-name {
      font-size: 1rem;
      font-weight: 700;
      color: #0a5c2e;
    }
    .district {
      font-size: 0.75rem;
      color: #64748b;
      margin: 5px 0;
    }
    .need-reason {
      background: #fef3c7;
      color: #b45309;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.65rem;
      display: inline-block;
      margin: 8px 0;
    }
    .donate-btn {
      background: #fbbf24;
      border: none;
      padding: 10px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      width: 100%;
      margin-top: 8px;
      cursor: pointer;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 360px;
      border-radius: 24px;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .close-modal {
      font-size: 26px;
      cursor: pointer;
      color: #94a3b8;
    }
    .amount-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 16px 0;
    }
    .amount-opt {
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
    }
    .amount-opt.active {
      border-color: #0a5c2e;
      background: #f0fdf4;
    }
    #customAmount {
      width: 100%;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }

    /* Footer */
    footer {
      background: #064e1f;
      color: #a7f3d0;
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      margin-top: 20px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0a5c2e;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      z-index: 2000;
      display: none;
    }
    .toast.error {
      background: #dc2626;
    }
  </style>
</head>
<body>

<div class="navbar">
  <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
  <div class="logo">All Madrasas</div>
  <button class="menu-icon" id="menuBtn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</div>

<div class="search-container">
  <input type="text" id="searchInput" class="search-box" placeholder="Search madrasa or district...">
</div>

<div class="filter-container">
  <label for="stateFilter" class="filter-label">Filter by state</label>
  <select id="stateFilter" class="state-filter">
    <option value="">All States</option>
    <option value="Bihar">Bihar</option>
    <option value="Uttar Pradesh">Uttar Pradesh</option>
    <option value="West Bengal">West Bengal</option>
    <option value="Maharashtra">Maharashtra</option>
    <option value="Delhi">Delhi</option>
  </select>
</div>

<div class="results-count" id="resultsCount">Loading...</div>

<div class="container">
  <div id="madrasaGrid" class="madrasa-grid"></div>
</div>

<footer>
  <p>© 2026 Imdad ul Madaris • Direct Donation • 0% Charges</p>
</footer>

<!-- Donation Modal -->
<div class="modal" id="donationModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalName">Madrasa</h3>
      <span class="close-modal" id="closeModalBtn">×</span>
    </div>
    <p id="modalUpi" style="background:#f1f5f9; padding:8px; border-radius:10px; font-size:0.75rem;"></p>
    <div class="amount-options" id="amountOptions"></div>
    <input type="number" id="customAmount" placeholder="Custom amount (₹)">
    <button class="donate-btn" id="proceedDonateBtn" style="margin-top: 14px;">Proceed to Pay</button>
    <div id="qrContainer" style="text-align: center; margin-top: 14px;"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="config.js"></script>
<script src="donation.js"></script>
<script src="index.js"></script>
<script src="madrasa-list.js"></script>

</body>
</html>
