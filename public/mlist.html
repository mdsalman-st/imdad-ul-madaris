<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>All Madrasas | Imdad ul Madaris</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fb;
      color: #1e293b;
    }

    /* Navbar - Clean */
    .navbar {
      background: #0a5c2e;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
    }

    /* Search Bar - Simple */
    .search-container {
      max-width: 600px;
      margin: 20px auto;
      padding: 0 16px;
    }
    .search-box {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #e2e8f0;
      border-radius: 50px;
      font-size: 0.9rem;
      background: white;
      outline: none;
    }
    .search-box:focus {
      border-color: #0a5c2e;
    }

    /* State Filter - Simple Dropdown */
    .filter-container {
      max-width: 600px;
      margin: 12px auto;
      padding: 0 16px;
    }
    .state-filter {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 50px;
      background: white;
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* Results Count */
    .results-count {
      max-width: 1200px;
      margin: 16px auto 0;
      padding: 0 16px;
      font-size: 0.8rem;
      color: #64748b;
    }

    /* Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Madrasa Grid - Clean Cards */
    .madrasa-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin: 20px 0 40px;
    }

    @media (min-width: 550px) {
      .madrasa-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .madrasa-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Card - Simple, No Extra Badges */
    .madrasa-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: 0.2s;
    }
    .madrasa-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }
    .card-img {
      height: 140px;
      background-size: cover;
      background-position: center;
    }
    .card-content {
      padding: 14px;
    }
    .madrasa-name {
      font-size: 1rem;
      font-weight: 700;
      color: #0a5c2e;
    }
    .district {
      font-size: 0.75rem;
      color: #64748b;
      margin: 5px 0;
    }
    .need-reason {
      background: #fef3c7;
      color: #b45309;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.65rem;
      display: inline-block;
      margin: 8px 0;
    }
    .donate-btn {
      background: #fbbf24;
      border: none;
      padding: 10px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      width: 100%;
      margin-top: 8px;
      cursor: pointer;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }

    footer {
      background: #064e1f;
      color: #a7f3d0;
      text-align: center;
      padding: 24px;
      font-size: 0.7rem;
      margin-top: 20px;
    }

    /* Modal - Clean */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      width: 90%;
      max-width: 360px;
      border-radius: 24px;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .close-modal {
      font-size: 26px;
      cursor: pointer;
      color: #94a3b8;
    }
    .amount-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 16px 0;
    }
    .amount-opt {
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
    }
    .amount-opt.active {
      border-color: #0a5c2e;
      background: #f0fdf4;
    }
    #customAmount {
      width: 100%;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<div class="navbar">
  <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
  <div class="logo">Imdad ul Madaris</div>
</div>

<div class="search-container">
  <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search madrasa or district...">
</div>

<div class="filter-container">
  <select id="stateFilter" class="state-filter">
    <option value="">All States</option>
    <option value="Bihar">Bihar</option>
    <option value="UP">Uttar Pradesh</option>
    <option value="WB">West Bengal</option>
    <option value="MH">Maharashtra</option>
  </select>
</div>

<div class="results-count" id="resultsCount">Loading...</div>

<div class="container">
  <div id="madrasaGrid" class="madrasa-grid"></div>
</div>

<footer>
  <p>© 2026 Imdad ul Madaris • Direct Donation • 0% Charges</p>
</footer>

<!-- Donation Modal -->
<div class="modal" id="donationModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalName">Madrasa</h3>
      <span class="close-modal" id="closeModalBtn">×</span>
    </div>
    <p id="modalUpi" style="background:#f1f5f9; padding:8px; border-radius:10px; font-size:0.75rem;"></p>
    <div class="amount-options" id="amountOptions"></div>
    <input type="number" id="customAmount" placeholder="Custom amount (₹)">
    <button class="donate-btn" id="proceedDonateBtn" style="margin-top: 14px;">💝 Pay via UPI</button>
    <div id="qrContainer" style="text-align: center; margin-top: 14px;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  const madrasasData = [
    { id: 1, name: "Jamia Islamia Darul Uloom", district: "Patna", state: "Bihar", upiId: "jamiapatna@okhdfcbank", needReason: "Food shortage for 50 children", needScore: 98, lat: 25.5941, lng: 85.1376 },
    { id: 2, name: "Madrasa Taleem-ul-Quran", district: "Muzaffarpur", state: "Bihar", upiId: "taleem@okhdfcbank", needReason: "Winter clothes needed", needScore: 92, lat: 26.1209, lng: 85.3645 },
    { id: 3, name: "Madrasa Al-Falah", district: "Araria", state: "Bihar", upiId: "alfalah@okhdfcbank", needReason: "Flood relief - immediate", needScore: 99, lat: 26.1482, lng: 87.5132 },
    { id: 4, name: "Darul Uloom Nadwa", district: "Lucknow", state: "UP", upiId: "nadwa@okhdfcbank", needReason: "Monthly expenses", needScore: 75, lat: 26.8467, lng: 80.9462 },
    { id: 5, name: "Madrasa Noorul Huda", district: "Sitamarhi", state: "Bihar", upiId: "noorul@okhdfcbank", needReason: "Books & stationery", needScore: 88, lat: 26.5931, lng: 85.4838 },
    { id: 6, name: "Madrasa Rahmatul Lil Alameen", district: "Kolkata", state: "WB", upiId: "rahmat@okhdfcbank", needReason: "Building maintenance", needScore: 68, lat: 22.5726, lng: 88.3639 },
    { id: 7, name: "Jamia Masjid Madrasa", district: "Mumbai", state: "MH", upiId: "jamiamb@okhdfcbank", needReason: "Evening classes", needScore: 62, lat: 19.076, lng: 72.8777 },
    { id: 8, name: "Madrasa Islahul Muslimeen", district: "Kishanganj", state: "Bihar", upiId: "islah@okhdfcbank", needReason: "Building repair", needScore: 94, lat: 26.1025, lng: 87.9496 }
  ];

  let currentSearch = "";
  let currentState = "";

  function filterMadrasas() {
    let filtered = [...madrasasData];

    if (currentSearch) {
      const search = currentSearch.toLowerCase();
      filtered = filtered.filter(m => 
        m.name.toLowerCase().includes(search) || 
        m.district.toLowerCase().includes(search)
      );
    }

    if (currentState) {
      filtered = filtered.filter(m => m.state === currentState);
    }

    filtered.sort((a,b) => b.needScore - a.needScore);
    return filtered;
  }

  function renderCard(m) {
    return `
      <div class="madrasa-card">
        <div class="card-img" style="background-image: url('https://source.unsplash.com/featured/400x140?mosque,${encodeURIComponent(m.district)}')"></div>
        <div class="card-content">
          <div class="madrasa-name">${m.name}</div>
          <div class="district">📍 ${m.district}, ${m.state}</div>
          <div class="need-reason">⚠️ ${m.needReason}</div>
          <button class="donate-btn" data-upi="${m.upiId}" data-name="${m.name}">💝 Donate Now</button>
        </div>
      </div>
    `;
  }

  function renderMadrasas() {
    const filtered = filterMadrasas();
    const grid = document.getElementById('madrasaGrid');
    const resultsCount = document.getElementById('resultsCount');

    resultsCount.innerHTML = `${filtered.length} madrasas found`;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state">🤲 No madrasas found</div>`;
      return;
    }

    grid.innerHTML = filtered.map(renderCard).join('');
    attachDonateEvents();
  }

  function attachDonateEvents() {
    document.querySelectorAll('.donate-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openDonationModal(btn.dataset.upi, btn.dataset.name);
      });
    });
  }

  // Donation Modal
  let currentUpi = "", currentName = "", selectedAmount = 101;
  const modal = document.getElementById('donationModal');

  function openDonationModal(upi, name) {
    currentUpi = upi;
    currentName = name;
    selectedAmount = 101;
    document.getElementById('modalName').innerText = name;
    document.getElementById('modalUpi').innerHTML = `UPI: ${upi}`;
    document.getElementById('customAmount').value = '';
    document.getElementById('qrContainer').innerHTML = '';
    renderAmountOptions();
    modal.style.display = 'flex';
  }

  function renderAmountOptions() {
    const amounts = [51, 101, 501, 1001];
    const container = document.getElementById('amountOptions');
    container.innerHTML = amounts.map(am => `
      <div class="amount-opt ${am === selectedAmount ? 'active' : ''}" data-amount="${am}">₹${am}</div>
    `).join('');
    document.querySelectorAll('.amount-opt').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.amount-opt').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        selectedAmount = parseInt(opt.dataset.amount);
        document.getElementById('customAmount').value = '';
      });
    });
  }

  document.getElementById('proceedDonateBtn')?.addEventListener('click', () => {
    let amount = document.getElementById('customAmount').value;
    if (amount && parseFloat(amount) > 0) selectedAmount = parseFloat(amount);
    if (!selectedAmount || selectedAmount <= 0) {
      alert("Please select or enter amount");
      return;
    }
    const upiLink = `upi://pay?pa=${encodeURIComponent(currentUpi)}&pn=${encodeURIComponent(currentName)}&am=${selectedAmount}&cu=INR`;
    const qrDiv = document.getElementById('qrContainer');
    qrDiv.innerHTML = `<div id="qrcode"></div><p><a href="${upiLink}" style="color:#0a5c2e;">Pay ₹${selectedAmount}</a></p>`;
    setTimeout(() => {
      if (typeof QRCode !== 'undefined') {
        new QRCode(document.getElementById("qrcode"), { text: upiLink, width: 140, height: 140 });
      }
    }, 100);
  });

  document.getElementById('closeModalBtn')?.addEventListener('click', () => modal.style.display = 'none');
  window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

  // Event Listeners
  document.getElementById('searchInput')?.addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderMadrasas();
  });
  document.getElementById('stateFilter')?.addEventListener('change', (e) => {
    currentState = e.target.value;
    renderMadrasas();
  });

  renderMadrasas();
</script>
</body>
</html>
