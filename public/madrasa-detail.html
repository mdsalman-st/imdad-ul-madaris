<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Madrasa Details | Imdad ul Madaris</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            color: #1a1a2e;
            line-height: 1.5;
        }

        /* Navbar */
        .navbar {
            background: #0a5c2e;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background: rgba(255,255,255,0.15);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
        }

        .logo-text span {
            font-size: 0.65rem;
            background: #fbbf24;
            color: #0a5c2e;
            padding: 2px 8px;
            border-radius: 30px;
            margin-left: 8px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            opacity: 0.85;
            transition: 0.2s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        .donate-btn-nav {
            background: #fbbf24;
            color: #0a5c2e !important;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            opacity: 1 !important;
        }

        /* Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 30px 24px;
        }

        /* Back Button */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #0a5c2e;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 24px;
            transition: 0.2s;
        }

        .back-link:hover {
            gap: 12px;
        }

        /* Hero Section */
        .hero-section {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .hero-cover {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero-content {
            padding: 24px 32px 32px;
            position: relative;
        }

        .madrasa-badge {
            position: absolute;
            top: -20px;
            right: 32px;
            background: #dc2626;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(220,38,38,0.3);
        }

        .madrasa-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0a5c2e;
            margin-bottom: 12px;
            padding-right: 120px;
        }

        .madrasa-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #475569;
        }

        .meta-chip i {
            color: #0a5c2e;
        }

        .need-alert {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 14px 20px;
            border-radius: 14px;
            margin-top: 16px;
        }

        .need-alert p {
            color: #b45309;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Grid Layout */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 32px;
        }

        /* Left Column */
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0a5c2e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .description-text {
            color: #475569;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .info-item {
            background: #f8fafc;
            padding: 14px 16px;
            border-radius: 16px;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
            margin-top: 4px;
            word-break: break-all;
        }

        /* Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }

        /* Right Column */
        .stats-card, .donation-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .stat-item {
            text-align: center;
            padding: 16px;
            background: #f8fafc;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0a5c2e;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        .amount-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .amount-btn {
            background: #f1f5f9;
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .amount-btn.active, .amount-btn:hover {
            background: #fbbf24;
            color: #0a5c2e;
        }

        .custom-input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.9rem;
            margin: 10px 0;
        }

        .donate-btn {
            background: #0a5c2e;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .donate-btn:hover {
            background: #064e1f;
        }

        /* Share Section */
        .share-section {
            margin-top: 20px;
            text-align: center;
        }

        .share-icons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
        }

        .share-icons a {
            width: 36px;
            height: 36px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            transition: 0.2s;
        }

        .share-icons a:hover {
            background: #0a5c2e;
            color: white;
        }

        footer {
            background: #064e1f;
            color: #a7f3d0;
            text-align: center;
            padding: 32px 20px;
            margin-top: 40px;
            font-size: 0.75rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
            .madrasa-name {
                font-size: 1.4rem;
                padding-right: 0;
            }
            .madrasa-badge {
                position: static;
                display: inline-block;
                margin-top: 10px;
            }
            .hero-content {
                padding: 20px;
            }
            .hero-cover {
                height: 150px;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px 16px;
            }
            .card, .stats-card, .donation-card {
                padding: 20px;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
            .madrasa-meta {
                gap: 10px;
            }
            .meta-chip {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
        }

        @media (max-width: 480px) {
            .amount-buttons {
                grid-template-columns: 1fr;
            }
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <div class="logo-icon">IUM</div>
        <div class="logo-text">Imdad ul Madaris <span>Direct</span></div>
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="all-madrasas.html">Madrasas</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="donation-form.html" class="donate-btn-nav">Donate Now</a>
    </div>
</div>

<div class="container">
    <a href="all-madrasas.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Madrasas</a>

    <div id="madrasaContent">
        <!-- Dynamic content loaded here -->
        <div style="text-align: center; padding: 60px;">Loading...</div>
    </div>
</div>

<footer>
    <p>© 2026 Imdad ul Madaris • Direct Donation Platform • 0% Charges • 100% Transparent</p>
</footer>

<script>
    // Madrasa Database
    const madrasasData = {
        1: {
            id: 1,
            name: "Jamia Islamia Darul Uloom",
            district: "Patna",
            state: "Bihar",
            upiId: "jamiapatna@okhdfcbank",
            description: "Jamia Islamia Darul Uloom is one of the oldest and most respected madrasas in Bihar, established in 1950. It provides quality Islamic education to over 150 students, including 50 orphans. The madrasa has a library with over 5,000 books, a computer lab, and a hostel facility. We focus on both Quranic education and modern academics.",
            needReason: "Food shortage for 50 children - need immediate support for daily meals. Each child needs ₹100 per day for food.",
            needScore: 98,
            students: 150,
            teachers: 12,
            staff: 8,
            established: 1950,
            contact: "+91 98765 43210",
            email: "jamia@imdad.com",
            website: "www.jamiapatna.edu",
            registrationNo: "MDR/JAM/001/1950"
        },
        2: {
            id: 2,
            name: "Madrasa Taleem-ul-Quran",
            district: "Muzaffarpur",
            state: "Bihar",
            upiId: "taleem@okhdfcbank",
            description: "Madrasa Taleem-ul-Quran specializes in Quranic education and Hifz program. Established in 1985, it has produced over 200 Huffaz. Currently, 100 orphan students live and study here. The madrasa needs support for winter clothing, educational materials, and daily meals.",
            needReason: "Winter clothes needed for 100 orphan students before winter season. Each student needs a winter kit worth ₹1500.",
            needScore: 92,
            students: 100,
            teachers: 8,
            staff: 6,
            established: 1985,
            contact: "+91 98765 43222",
            email: "taleem@imdad.com",
            website: "www.taleemmuzaffarpur.edu",
            registrationNo: "MDR/TAL/002/1985"
        }
    };

    // Get ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const madrasaId = urlParams.get('id') || 1;
    const madrasa = madrasasData[madrasaId] || madrasasData[1];

    function formatNumber(num) {
        return num.toLocaleString('en-IN');
    }

    function renderPage() {
        const container = document.getElementById('madrasaContent');
        
        container.innerHTML = `
            <!-- Hero Section -->
            <div class="hero-section">
                <div class="hero-cover" style="background-image: url('https://images.unsplash.com/photo-1584551246679-258d75b4e8e3?w=1200')"></div>
                <div class="hero-content">
                    ${madrasa.needScore > 90 ? '<div class="madrasa-badge"><i class="fas fa-exclamation-triangle"></i> URGENT HELP NEEDED</div>' : ''}
                    <h1 class="madrasa-name">${madrasa.name}</h1>
                    <div class="madrasa-meta">
                        <span class="meta-chip"><i class="fas fa-map-marker-alt"></i> ${madrasa.district}, ${madrasa.state}</span>
                        <span class="meta-chip"><i class="fas fa-calendar-alt"></i> Est. ${madrasa.established}</span>
                        <span class="meta-chip"><i class="fas fa-certificate"></i> Reg: ${madrasa.registrationNo}</span>
                    </div>
                    <div class="need-alert">
                        <p><i class="fas fa-hand-holding-heart"></i> <strong>Current Need:</strong> ${madrasa.needReason}</p>
                    </div>
                </div>
            </div>

            <div class="detail-grid">
                <!-- Left Column -->
                <div>
                    <div class="card">
                        <div class="card-title"><i class="fas fa-info-circle"></i> About Madrasa</div>
                        <p class="description-text">${madrasa.description}</p>
                        
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">UPI ID for Donation</div>
                                <div class="info-value">${madrasa.upiId}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Contact Number</div>
                                <div class="info-value">${madrasa.contact}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Email Address</div>
                                <div class="info-value">${madrasa.email}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Website</div>
                                <div class="info-value">${madrasa.website || 'Coming Soon'}</div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title"><i class="fas fa-images"></i> Photo Gallery</div>
                        <div class="gallery-grid">
                            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1584551246679-258d75b4e8e3?w=300')"></div>
                            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=300')"></div>
                            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1584361853934-1d9b9e5f5c3f?w=300')"></div>
                            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1593113630400-ea4288917d29?w=300')"></div>
                            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1532629345422-7515f3d16d6e?w=300')"></div>
                            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=300')"></div>
                        </div>
                    </div>
                </div>

                <!-- Right Column -->
                <div>
                    <div class="stats-card">
                        <div class="card-title"><i class="fas fa-chart-simple"></i> At a Glance</div>
                        <div class="stat-item">
                            <div class="stat-number">${formatNumber(madrasa.students)}+</div>
                            <div class="stat-label">Students Enrolled</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${madrasa.teachers}</div>
                            <div class="stat-label">Qualified Teachers</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${madrasa.staff}</div>
                            <div class="stat-label">Support Staff</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">₹${formatNumber(madrasa.students * 500)}</div>
                            <div class="stat-label">Monthly Expenses</div>
                        </div>
                    </div>

                    <div class="donation-card">
                        <div class="card-title"><i class="fas fa-hand-holding-heart"></i> Support This Madrasa</div>
                        <div class="amount-buttons" id="amountButtons">
                            <button class="amount-btn" data-amount="100">₹100</button>
                            <button class="amount-btn" data-amount="500">₹500</button>
                            <button class="amount-btn" data-amount="1000">₹1,000</button>
                        </div>
                        <input type="number" class="custom-input" id="customAmount" placeholder="Enter custom amount (₹)" min="1">
                        <button class="donate-btn" id="donateNowBtn"><i class="fas fa-rupee-sign"></i> Donate Now</button>

                        <div class="share-section">
                            <div class="share-icons">
                                <a href="#" id="shareWhatsapp"><i class="fab fa-whatsapp"></i></a>
                                <a href="#" id="shareTwitter"><i class="fab fa-twitter"></i></a>
                                <a href="#" id="shareFacebook"><i class="fab fa-facebook-f"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // Amount button click handler
        const amountBtns = document.querySelectorAll('.amount-btn');
        const customInput = document.getElementById('customAmount');
        
        amountBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                amountBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                customInput.value = '';
            });
        });

        // Donate button
        document.getElementById('donateNowBtn').addEventListener('click', () => {
            let amount = document.querySelector('.amount-btn.active')?.dataset.amount;
            const customVal = customInput.value;
            if (customVal && parseFloat(customVal) > 0) {
                amount = customVal;
            }
            if (!amount || parseFloat(amount) <= 0) {
                alert('Please select or enter a valid amount');
                return;
            }
            window.location.href = `donation-form.html?madrasa=${encodeURIComponent(madrasa.name)}&upi=${madrasa.upiId}&need=${encodeURIComponent(madrasa.needReason)}&amount=${amount}`;
        });

        // Share buttons
        const shareText = `Support ${madrasa.name} - ${madrasa.needReason} Donate at Imdad ul Madaris`;
        const shareUrl = encodeURIComponent(window.location.href);
        
        document.getElementById('shareWhatsapp').addEventListener('click', (e) => {
            e.preventDefault();
            window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank');
        });
        document.getElementById('shareTwitter').addEventListener('click', (e) => {
            e.preventDefault();
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`, '_blank');
        });
        document.getElementById('shareFacebook').addEventListener('click', (e) => {
            e.preventDefault();
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${shareUrl}`, '_blank');
        });
    }

    renderPage();
</script>
</body>
</html>
