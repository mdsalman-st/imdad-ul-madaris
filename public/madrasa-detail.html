<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Madrasa Details | Imdad ul Madaris</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1a1a2e; line-height: 1.5; }

        .navbar { background: #0a5c2e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { background: rgba(255,255,255,0.15); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; color: white; }
        .logo-text { font-size: 1rem; font-weight: 700; color: white; }
        .menu-btn { background: none; border: none; cursor: pointer; padding: 4px; }

        .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #0a5c2e; text-decoration: none; font-weight: 500; font-size: 0.85rem; margin-bottom: 20px; }

        .hero-section { background: white; border-radius: 28px; overflow: hidden; margin-bottom: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .hero-cover { height: 200px; background-size: cover; background-position: center; }
        .hero-content { padding: 24px 28px 28px; position: relative; }
        .madrasa-badge { position: absolute; top: -20px; right: 28px; background: #dc2626; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; font-weight: 600; box-shadow: 0 4px 12px rgba(220,38,38,0.3); }
        .madrasa-name { font-size: 1.6rem; font-weight: 800; color: #0a5c2e; margin-bottom: 10px; padding-right: 130px; }
        .madrasa-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
        .meta-chip { display: inline-flex; align-items: center; gap: 6px; background: #f1f5f9; padding: 5px 12px; border-radius: 40px; font-size: 0.75rem; color: #475569; }
        .need-alert { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 14px 20px; border-radius: 14px; margin-top: 14px; }

        .detail-grid { display: grid; grid-template-columns: 1fr 360px; gap: 28px; }
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .card-title { font-size: 1.1rem; font-weight: 700; color: #0a5c2e; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .info-item { background: #f8fafc; padding: 12px 14px; border-radius: 14px; }
        .info-label { font-size: 0.65rem; text-transform: uppercase; color: #64748b; letter-spacing: 0.5px; }
        .info-value { font-size: 0.9rem; font-weight: 600; color: #0f172a; margin-top: 4px; word-break: break-all; }

        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
        .gallery-item { aspect-ratio: 1; border-radius: 14px; background-size: cover; background-position: center; cursor: pointer; transition: 0.2s; }
        .gallery-item:hover { transform: scale(1.03); }

        .stats-card, .donation-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .stat-item { text-align: center; padding: 14px; background: #f8fafc; border-radius: 18px; margin-bottom: 12px; }
        .stat-number { font-size: 1.6rem; font-weight: 800; color: #0a5c2e; }
        .stat-label { font-size: 0.7rem; color: #64748b; margin-top: 2px; }

        .amount-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 16px 0; }
        .amount-btn { background: #f1f5f9; border: 2px solid transparent; padding: 10px; border-radius: 12px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .amount-btn.active, .amount-btn:hover { background: #fbbf24; border-color: #0a5c2e; color: #0a5c2e; }
        .custom-input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 0.85rem; margin: 8px 0; }
        .donate-btn { background: #0a5c2e; color: white; border: none; padding: 14px; border-radius: 50px; font-weight: 700; width: 100%; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        .donate-btn:hover { background: #064e1f; }

        .share-section { margin-top: 18px; text-align: center; }
        .share-icons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .share-icons a { width: 34px; height: 34px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #475569; text-decoration: none; transition: 0.2s; }
        .share-icons a:hover { background: #0a5c2e; color: white; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; padding: 24px; width: 90%; max-width: 400px; }

        footer { background: #064e1f; color: #a7f3d0; text-align: center; padding: 28px 20px; margin-top: 36px; font-size: 0.7rem; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; padding: 12px 24px; border-radius: 30px; font-weight: 600; color: white; display: none; }

        @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } .madrasa-name { font-size: 1.3rem; padding-right: 0; } .madrasa-badge { position: static; display: inline-block; margin-top: 10px; } }
        @media (max-width: 480px) { .info-grid { grid-template-columns: 1fr; } .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="logo">
        <div class="logo-icon">IUM</div>
        <div class="logo-text">Imdad ul Madaris</div>
    </a>
    <button class="menu-btn" id="menuBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
</div>

<div class="container">
    <a href="mlist.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Madrasas</a>

    <div id="madrasaContent">
        <div style="text-align: center; padding: 60px;">
            <div style="font-size: 2rem; margin-bottom: 12px;">🕌</div>
            <p style="color: #64748b;">Loading madrasa details...</p>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Imdad ul Madaris &bull; Direct Donation &bull; 0% Charges &bull; 100% Transparent</p>
</footer>

<!-- Donation Modal -->
<div class="modal" id="donationModal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 style="font-weight: 700; color: #0a5c2e;">Complete Donation</h3>
            <span onclick="closeDonationModal()" style="font-size: 24px; cursor: pointer; color: #94a3b8;">&times;</span>
        </div>
        <p style="font-size: 0.85rem; margin-bottom: 4px;">Donating to: <strong id="modalMadrasaName"></strong></p>
        <p style="font-size: 0.75rem; color: #64748b; margin-bottom: 12px;">Amount: <strong id="modalAmount"></strong></p>
        <div id="qrContainer" style="text-align: center;"></div>
        <a id="upiLink" href="#" style="display: block; text-align: center; margin-top: 12px; background: #0a5c2e; color: white; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: 600;">Open UPI App</a>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="index.js"></script>
<script src="madrasa-detail.js"></script>

</body>
</html>
