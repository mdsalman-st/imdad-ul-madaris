<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Imdad ul Madaris</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; color: #1e293b; }

        .navbar { background: #0a5c2e; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .navbar h1 { font-size: 1.3rem; font-weight: 700; }
        .navbar a { color: white; text-decoration: none; font-size: 0.9rem; }

        .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }

        .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
        .category-btn { background: #e2e8f0; padding: 8px 16px; border-radius: 20px; cursor: pointer; border: none; font-weight: 500; transition: 0.2s; font-size: 0.85rem; }
        .category-btn.active, .category-btn:hover { background: #0a5c2e; color: white; }

        .search-box { display: flex; gap: 8px; margin-left: auto; }
        .search-box input { padding: 8px 14px; border: 2px solid #e2e8f0; border-radius: 20px; font-size: 0.9rem; outline: none; }
        .search-box button { background: #0a5c2e; color: white; border: none; border-radius: 20px; padding: 8px 16px; cursor: pointer; }

        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .blog-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.2s; }
        .blog-card:hover { transform: translateY(-4px); }
        .blog-image { height: 160px; background-size: cover; background-position: center; position: relative; }
        .blog-category { position: absolute; top: 10px; left: 10px; background: #0a5c2e; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
        .blog-content { padding: 16px; }
        .blog-meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: #64748b; margin-bottom: 8px; }
        .blog-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
        .blog-excerpt { font-size: 0.85rem; color: #475569; margin-bottom: 12px; }
        .read-more { color: #0a5c2e; font-weight: 600; font-size: 0.8rem; }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 30px; }
        .page-btn { background: #e2e8f0; padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .page-btn.active { background: #0a5c2e; color: white; }

        .newsletter { background: white; border-radius: 16px; padding: 30px; margin-top: 40px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .newsletter input { padding: 12px 20px; border: 2px solid #e2e8f0; border-radius: 30px; font-size: 0.9rem; width: 250px; max-width: 100%; }
        .newsletter button { background: #0a5c2e; color: white; border: none; border-radius: 30px; padding: 12px 24px; cursor: pointer; font-weight: 600; margin-top: 10px; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999; padding: 12px 24px; border-radius: 30px; font-weight: 600; color: white; display: none; }

        @media (max-width: 600px) {
            .filters { flex-direction: column; align-items: flex-start; }
            .search-box { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>Imdad ul Madaris Blog</h1>
    <a href="index.html">← Home</a>
</div>

<div class="container">
    <!-- Category Filters -->
    <div class="filters">
        <button class="category-btn active" data-cat="all">All</button>
        <button class="category-btn" data-cat="islamic">Islamic</button>
        <button class="category-btn" data-cat="news">News</button>
        <button class="category-btn" data-cat="stories">Stories</button>
        <button class="category-btn" data-cat="updates">Updates</button>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search articles...">
            <button id="searchBtn">🔍</button>
        </div>
    </div>

    <!-- Blog Grid -->
    <div class="blog-grid" id="blogGrid"></div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

    <!-- Newsletter -->
    <div class="newsletter">
        <h2>📬 Stay Updated</h2>
        <p style="margin-bottom:12px; color:#64748b;">Get the latest articles and updates directly in your inbox.</p>
        <input type="email" id="newsletterEmail" placeholder="Enter your email">
        <button id="subscribeBtn">Subscribe</button>
    </div>
</div>

<div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script src="blog.js"></script>
</body>
</html>
