<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Imdad ul Madaris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F7F7F5; }
        .input-classic { border-bottom: 2px solid #E5E5E5; transition: all 0.3s ease; }
        .input-classic:focus { border-bottom-color: #0a5c2e; outline: none; }
        .role-card { transition: all 0.2s ease; }
        .role-card:hover { border-color: #0a5c2e; background-color: #f0fdf4; }
        
        input[type="file"]::file-selector-button {
            margin-right: 16px;
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            background-color: #f1f5f9;
            color: #1C2026;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        input[type="file"]::file-selector-button:hover { background-color: #e2e8f0; }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #0a5c2e;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .navbar-logo {
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
        }
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 pt-20 pb-10">

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">Imdad ul Madaris</a>
        <button class="menu-btn" id="menuBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
    </nav>

    <div class="bg-white rounded-xl shadow-[0_15px_40px_rgba(0,0,0,0.06)] w-full max-w-md p-8 md:p-10 border border-gray-100 relative overflow-hidden">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-[#0a5c2e]">IMDAD</h1>
            <p class="text-gray-400 text-sm mt-1" id="sub-heading">Welcome back</p>
        </div>

        <!-- ========== LOGIN SECTION ========== -->
        <div id="login-section" class="block">
            <form id="loginForm" class="space-y-5">
                <input type="text" name="phone" placeholder="Mobile Number" required 
                       class="w-full pb-3 bg-transparent input-classic text-gray-800 placeholder-gray-400">
                <input type="password" name="password" placeholder="Password" required 
                       class="w-full pb-3 bg-transparent input-classic text-gray-800 placeholder-gray-400">
                
                <button type="submit" class="w-full bg-[#0a5c2e] text-white font-medium py-3.5 rounded-lg hover:bg-[#0d7a3e] transition duration-300">
                    Log in
                </button>
            </form>
            
            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-500">Account nahi hai? 
                    <button onclick="showSection('role-section', 'Aap kaun hain?')" class="text-[#0a5c2e] font-semibold hover:underline">Naya Account Banayein</button>
                </p>
                <a href="index.html" class="block mt-3 text-xs text-gray-400 hover:text-gray-600">← Back to Home</a>
            </div>
        </div>

        <!-- ========== ROLE SELECTION ========== -->
        <div id="role-section" class="hidden">
            <div class="space-y-4">
                <div onclick="showSection('donor-section', 'Donor Registration')" class="role-card border-2 border-gray-100 rounded-lg p-5 cursor-pointer">
                    <h3 class="text-lg font-semibold text-[#1C2026]">Main Donor Hoon 🤝</h3>
                    <p class="text-sm text-gray-500 mt-1">Madrasa aur zarooratmand ko madad bhejne ke liye.</p>
                </div>
                
                <div onclick="showSection('madrasa-section', 'Madrasa Registration')" class="role-card border-2 border-gray-100 rounded-lg p-5 cursor-pointer">
                    <h3 class="text-lg font-semibold text-[#1C2026]">Main Madrasa Hoon 🕌</h3>
                    <p class="text-sm text-gray-500 mt-1">Apni sanstha ko register karke madad prapt karne ke liye.</p>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <button onclick="showSection('login-section', 'Welcome back')" class="text-sm text-gray-500 hover:text-[#0a5c2e] transition font-medium">← Wapas Login par jayein</button>
            </div>
        </div>

        <!-- ========== DONOR REGISTRATION ========== -->
        <div id="donor-section" class="hidden">
            <form id="donorForm" class="space-y-5">
                <input type="text" name="fullName" placeholder="Aapka Pura Naam" required 
                       class="w-full pb-2 bg-transparent input-classic text-gray-800 placeholder-gray-400">
                <input type="text" name="phone" placeholder="Mobile Number" required 
                       class="w-full pb-2 bg-transparent input-classic text-gray-800 placeholder-gray-400">
                <input type="password" name="password" placeholder="Password Set Karein" required 
                       class="w-full pb-2 bg-transparent input-classic text-gray-800 placeholder-gray-400">
                
                <button type="submit" class="w-full bg-[#0a5c2e] text-white font-medium py-3.5 rounded-lg hover:bg-[#0d7a3e] transition duration-300 mt-4">
                    Register as Donor
                </button>
            </form>
            
            <div class="mt-6 pt-4 text-center">
                <button onclick="showSection('role-section', 'Aap kaun hain?')" class="text-sm text-gray-500 hover:text-[#0a5c2e] transition">← Peeche Jayein</button>
            </div>
        </div>

        <!-- ========== MADRASA REGISTRATION ========== -->
        <div id="madrasa-section" class="hidden max-h-[70vh] overflow-y-auto pr-2">
            <form id="madrasaForm" class="space-y-5">
                <input type="text" name="madrasaName" placeholder="Institution/Madrasa Name" required 
                       class="w-full pb-2 bg-transparent input-classic text-gray-800 placeholder-gray-400">
                <input type="text" name="mohtamim" placeholder="Manager/Mohtamim Name" required 
                       class="w-full pb-2 bg-transparent input-classic text-gray-800 placeholder-gray-400">
                
                <div class="flex gap-4">
                    <input type="text" name="phone" placeholder="Mobile No." required 
                           class="w-1/2 pb-2 bg-transparent input-classic text-gray-800 placeholder-gray-400">
                    <input type="text" name="district" placeholder="District" required 
                           class="w-1/2 pb-2 bg-transparent input-classic text-gray-800 placeholder-gray-400">
                </div>
                
                <input type="text" name="upi" placeholder="Official UPI ID (e.g. 9876@paytm)" required 
                       class="w-full pb-2 bg-transparent input-classic text-gray-800 placeholder-gray-400 font-mono text-sm">
                <input type="password" name="password" placeholder="Create Password" required 
                       class="w-full pb-2 bg-transparent input-classic text-gray-800 placeholder-gray-400">

                <div class="mt-8 pt-6 border-t border-gray-100">
                    <h3 class="text-sm font-bold text-[#1C2026] mb-4">KYC Documents (Mandatory)</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">1. Mohtamim ka Aadhaar Card</label>
                            <input type="file" name="aadhaarDoc" accept=".jpg, .jpeg, .png, .pdf" required 
                                   class="w-full text-sm text-gray-600 focus:outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">2. Madrasa/Mohtamim ka PAN Card</label>
                            <input type="file" name="panDoc" accept=".jpg, .jpeg, .png, .pdf" required 
                                   class="w-full text-sm text-gray-600 focus:outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">3. Madrasa Registration Proof / Letterhead</label>
                            <input type="file" name="madrasaProof" accept=".jpg, .jpeg, .png, .pdf" required 
                                   class="w-full text-sm text-gray-600 focus:outline-none">
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-[#0a5c2e] text-white font-medium py-3.5 rounded-lg hover:bg-[#0d7a3e] transition duration-300 mt-6 shadow-md">
                    Submit Application for Verification
                </button>
            </form>

            <div class="mt-6 pt-4 text-center">
                <button onclick="showSection('role-section', 'Aap kaun hain?')" class="text-sm text-gray-500 hover:text-[#0a5c2e] transition">← Peeche Jayein</button>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div id="authToast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;display:none;"></div>

    <!-- Scripts -->
    <script src="index.js"></script>
    <script src="auth.js"></script>
    <script>
        // Section switcher (minimal inline)
        function showSection(sectionId, subHeadingText) {
            ['login-section','role-section','donor-section','madrasa-section'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(sectionId).classList.remove('hidden');
            document.getElementById('sub-heading').innerText = subHeadingText;
        }
    </script>
</body>
</html>
