<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Imdad ul Madaris</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0fdf4; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: #0a5c2e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { background: rgba(255,255,255,0.15); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; color: white; }
        .logo-text { font-size: 1.1rem; font-weight: 700; color: white; }
        .menu-btn { background: none; border: none; cursor: pointer; padding: 4px; }
        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .card { background: white; border-radius: 24px; padding: 40px 30px; text-align: center; max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .icon { font-size: 3.5rem; margin-bottom: 16px; }
        h1 { color: #0a5c2e; font-size: 1.5rem; margin-bottom: 8px; }
        p { color: #64748b; margin-bottom: 20px; font-size: 0.9rem; }
        .details { background: #f8fafc; border-radius: 14px; padding: 16px; margin: 16px 0; text-align: left; font-size: 0.85rem; }
        .details div { display: flex; justify-content: space-between; padding: 6px 0; }
        .btn { display: inline-block; background: #0a5c2e; color: white; padding: 12px 28px; border-radius: 30px; text-decoration: none; font-weight: 600; margin: 4px; }
        .btn-outline { background: white; color: #0a5c2e; border: 2px solid #0a5c2e; }
        .status-pending { background: #fef3c7; color: #92400e; border: 2px solid #f59e0b; padding: 10px 16px; border-radius: 10px; font-size: 0.85rem; margin: 12px 0; }
        .status-received { background: #d1fae5; color: #065f46; border: 2px solid #10b981; padding: 10px 16px; border-radius: 10px; font-size: 0.85rem; margin: 12px 0; }
        footer { background: #064e1f; color: #a7f3d0; text-align: center; padding: 20px; font-size: 0.7rem; margin-top: auto; }
    </style>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕌</text></svg>">
</head>
<body>
<div class="navbar">
    <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" style="height: 45px; width: auto; max-width: 150px;">
        <text x="50%" y="55%" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="80" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="8">IUM</text>
        <text x="50%" y="85%" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="16" fill="#fbbf24" text-anchor="middle" dominant-baseline="middle" letter-spacing="5">IMDADUL MADARIS</text>
    </svg>
</a>
    <button class="menu-btn" id="menuBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
</div>
<div class="container">
    <div class="card">
        <div class="icon">🤲</div>
        <h1>Jazakallah Khair!</h1>
        <p>Your donation has been completed. May Allah accept it.</p>
        <div class="details" id="donationDetails">
            <div><span>Receipt No</span><strong id="receiptNo">--</strong></div>
            <div><span>Madrasa</span><strong id="madrasa">--</strong></div>
            <div><span>Amount</span><strong id="amount">--</strong></div>
            <div><span>Type</span><strong id="type">--</strong></div>
        </div>
        <div id="statusBox"></div>
        <a href="index.html" class="btn">Back to Home</a>
        <a href="madrasa-list.html" class="btn btn-outline">Donate Again</a>
    </div>
</div>
<footer><p>&copy; 2026 Imdad ul Madaris</p></footer>
<script>
    const p = new URLSearchParams(location.search);
    document.getElementById('receiptNo').textContent = p.get('receipt') || 'IMD-'+Date.now();
    document.getElementById('madrasa').textContent = p.get('madrasa') || 'Madrasa';
    document.getElementById('amount').textContent = '₹'+(p.get('amount')||'0');
    document.getElementById('type').textContent = p.get('type')||'General';
    
    const statusBox = document.getElementById('statusBox');
    if (p.get('status') === 'pending') {
        statusBox.innerHTML = '<div class="status-pending">⏳ <strong>Payment Pending Verification</strong><br>Aapka donation record kar liya gaya hai. Admin 24-48 ghante mein UPI screenshot verify karke confirm kar denge.</div>';
        document.querySelector('p').textContent = 'Aapka donation form submit ho gaya. Payment complete karne ke baad screenshot admin ko bhejein.';
    } else {
        statusBox.innerHTML = '<div class="status-received">✅ <strong>Payment Verified!</strong></div>';
    }
</script>
</body>
</html>
