<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Imdad ul Madaris</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #006400; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-login { background: #006400; color: white; }
        .btn-signup { background: #f39c12; color: white; margin-top: 5px; font-size: 14px; }
        #message { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Imdad ul Madaris</h2>
        
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password (Min 6 chars)">
        
        <button class="btn-login" onclick="login()">Login</button>
        <button class="btn-signup" onclick="window.location.href='signup.html'">Create New Account</button>

        <p id="message"></p>
    </div>

    <script type="module" src="login-logic.js"></script>
</body>
</html>
