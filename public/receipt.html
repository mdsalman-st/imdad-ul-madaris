<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt | Imdad ul Madaris</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .navbar { background: #0a5c2e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { background: rgba(255,255,255,0.15); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; color: white; }
        .logo-text { font-size: 1.1rem; font-weight: 700; color: white; }
        .menu-btn { background: none; border: none; cursor: pointer; padding: 4px; }
        .container { max-width: 600px; margin: 30px auto; padding: 0 20px; }
        .search-card { background: white; border-radius: 20px; padding: 28px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .search-card h2 { color: #0a5c2e; margin-bottom: 16px; }
        .search-box { display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 30px; outline: none; }
        .search-box button { background: #0a5c2e; color: white; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .receipt-card { background: white; border-radius: 20px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: none; margin-top: 20px; }
        .receipt-card h3 { text-align: center; color: #0a5c2e; margin-bottom: 16px; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        .row span:last-child { font-weight: 600; }
        .amount-row { background: #f0fdf4; padding: 12px; border-radius: 10px; margin-top: 8px; }
        .btn-row { display: flex; gap: 8px; margin-top: 16px; }
        .btn { flex: 1; padding: 10px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; text-align: center; }
        .btn-print { background: #0a5c2e; color: white; }
        .btn-new { background: #f1f5f9; color: #0f172a; }
        .error { color: #dc2626; font-size: 0.8rem; margin-top: 8px; display: none; }
        footer { background: #064e1f; color: #a7f3d0; text-align: center; padding: 20px; font-size: 0.7rem; margin-top: 40px; }
        @media print { .navbar, .search-card, .btn-row, footer { display: none; } .receipt-card { display: block !important; box-shadow: none; } }
    </style>
</head>
<body>
<div class="navbar">
    <a href="index.html" class="logo"><div class="logo-icon">IUM</div><div class="logo-text">Imdad ul Madaris</div></a>
    <button class="menu-btn" id="menuBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
</div>
<div class="container">
    <div class="search-card" id="searchCard">
        <h2>Get Donation Receipt</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Transaction ID or Email">
            <button id="searchBtn">Search</button>
        </div>
        <p class="error" id="errorMsg">No donation found.</p>
    </div>
    <div class="receipt-card" id="receiptCard"></div>
</div>
<footer><p>&copy; 2026 Imdad ul Madaris</p></footer>
<script src="config.js"></script>
<script src="index.js"></script>
<script src="receipt.js"></script>
</body>
</html>
